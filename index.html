<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuel AI | Asistente de Infraestructura</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="top-header">
            <div class="header-logo">
                <span class="logo-text">MZ_OS // AI</span>
            </div>
            <div class="header-actions">
                <div id="header-contact" class="header-contact"></div>
                <button id="new-chat-btn" class="icon-btn" title="Nueva conversación">🔄</button>
                <button id="theme-toggle" class="icon-btn" title="Cambiar tema">🌓</button>
            </div>
        </header>

        <main class="chat-main">
            <div class="chat-messages" id="chat-messages">
                </div>

            <div class="chat-input-area">
                <div class="suggestions" id="suggestions">
                    <button class="suggestion-btn" data-action="inicio">🏠 Inicio</button>
                    <button class="suggestion-btn" data-action="sobre-mi">👤 Sobre mí</button>
                    <button class="suggestion-btn" data-action="certificaciones">📜 Certificaciones</button>
                    <button class="suggestion-btn" data-action="proyectos">🚀 Proyectos</button>
                    <button class="suggestion-btn" data-action="skills">🛠️ Skills</button>
                </div>
                
                <div class="input-container">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Escribe un comando o selecciona una opción..." autocomplete="off">
                    <button id="send-btn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="./js/main.js" defer></script>
</body>
</html>
